# KIN Capacitor Builder v1.0.6
# Reusable Android Build Workflow — Configurable Icon Modes

name: Android Build

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '22'
      java_version:
        required: false
        type: string
        default: '17'
      build_type:
        required: false
        type: string
        default: 'debug'
      icon_mode:
        description: 'Icon handling: resources, native, custom'
        required: false
        type: string
        default: 'resources'
      icon_source:
        description: 'Path to custom icon source (for custom mode)'
        required: false
        type: string
        default: 'branding/icons'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java_version }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Verify Icon Mode
      run: |
        echo "📋 Icon Mode: ${{ inputs.icon_mode }}"
        echo "📁 Icon Source: ${{ inputs.icon_source }}"

    - name: Install Dependencies
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend && npm install --legacy-peer-deps
        else
          npm install --legacy-peer-deps
        fi

    - name: Build Web
      run: |
        if [ -f "frontend/package.json" ]; then
          cd frontend && npm run build
        else
          npm run build
        fi

    - name: Handle Icons (resources mode)
      if: inputs.icon_mode == 'resources'
      run: |
        echo "🔧 Generating icons from resources/icon.png"
        if [ -f "frontend/resources/icon.png" ] || [ -f "resources/icon.png" ]; then
          echo "✅ resources/icon.png found"
          npx capacitor-assets generate --android 2>/dev/null || echo "⚠️ capacitor-assets not available, skipping generation"
        else
          echo "⚠️ resources/icon.png not found, using defaults"
        fi

    - name: Handle Icons (native mode)
      if: inputs.icon_mode == 'native'
      run: |
        echo "🔧 Preserving native icons"
        # Backup existing mipmap files before sync
        if [ -d "frontend/android/app/src/main/res/mipmap-hdpi" ]; then
          cp -r frontend/android/app/src/main/res/mipmap-* /tmp/mipmap-backup/ 2>/dev/null || true
          echo "✅ Native icons backed up"
        elif [ -d "android/app/src/main/res/mipmap-hdpi" ]; then
          cp -r android/app/src/main/res/mipmap-* /tmp/mipmap-backup/ 2>/dev/null || true
          echo "✅ Native icons backed up"
        fi

    - name: Sync Capacitor
      run: |
        echo "🔧 Syncing Capacitor..."
        if [ -f "frontend/capacitor.config.json" ]; then
          cd frontend && npx cap sync android
        else
          npx cap sync android
        fi

    - name: Restore Native Icons (native mode)
      if: inputs.icon_mode == 'native'
      run: |
        echo "🔧 Restoring native icons..."
        if [ -d "/tmp/mipmap-backup" ]; then
          if [ -d "frontend/android/app/src/main/res" ]; then
            cp -r /tmp/mipmap-backup/* frontend/android/app/src/main/res/ 2>/dev/null || true
          elif [ -d "android/app/src/main/res" ]; then
            cp -r /tmp/mipmap-backup/* android/app/src/main/res/ 2>/dev/null || true
          fi
          echo "✅ Native icons restored"
        fi

    - name: Copy Custom Icons (custom mode)
      if: inputs.icon_mode == 'custom'
      run: |
        echo "🔧 Copying custom icons from ${{ inputs.icon_source }}"
        if [ -d "${{ inputs.icon_source }}" ]; then
          echo "✅ Source found: ${{ inputs.icon_source }}"
          if [ -d "frontend/android/app/src/main/res" ]; then
            cp -r ${{ inputs.icon_source }}/* frontend/android/app/src/main/res/mipmap-*/ 2>/dev/null || true
          elif [ -d "android/app/src/main/res" ]; then
            cp -r ${{ inputs.icon_source }}/* android/app/src/main/res/mipmap-*/ 2>/dev/null || true
          fi
          echo "✅ Custom icons copied"
        else
          echo "⚠️ Source not found: ${{ inputs.icon_source }}"
        fi

    - name: Verify Icons
      run: |
        echo "🔍 Verifying icons..."
        if [ -d "frontend/android/app/src/main/res" ]; then
          ls -la frontend/android/app/src/main/res/mipmap-*/ic_launcher.png 2>/dev/null || echo "⚠️ No icons found"
        elif [ -d "android/app/src/main/res" ]; then
          ls -la android/app/src/main/res/mipmap-*/ic_launcher.png 2>/dev/null || echo "⚠️ No icons found"
        fi

    - name: Build Debug APK
      run: |
        if [ -d "frontend/android" ]; then
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        elif [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          android/app/build/outputs/apk/debug/*.apk
          frontend/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
