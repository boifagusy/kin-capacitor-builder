# KIN Capacitor Builder v1.0.6
# Production-grade reusable Android build workflow
# Supports: resources, native, custom icon modes
# Supports: Debug and Release builds
# Auto-detects project structure

name: Android Build

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '22'
      java_version:
        required: false
        type: string
        default: '17'
      build_type:
        description: 'Build type: debug, release, both'
        required: false
        type: string
        default: 'debug'
      icon_mode:
        description: 'Icon handling: resources, native, custom'
        required: false
        type: string
        default: 'resources'
      icon_source:
        description: 'Path to custom icon source (for custom mode)'
        required: false
        type: string
        default: 'branding/icons'
      generate_assets:
        description: 'Generate assets from resources/ (requires @capacitor/assets)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      build_summary: ${{ steps.summary.outputs.summary }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java_version }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Detect Project Structure
      id: detect
      run: |
        if [ -f "frontend/package.json" ]; then
          echo "APP_DIR=frontend" >> $GITHUB_ENV
          echo "PROJECT_TYPE=frontend" >> $GITHUB_ENV
        else
          echo "APP_DIR=." >> $GITHUB_ENV
          echo "PROJECT_TYPE=root" >> $GITHUB_ENV
        fi
        echo "📁 Project structure detected: ${{ env.APP_DIR }}"

    - name: Install Dependencies
      working-directory: ${{ env.APP_DIR }}
      run: npm install --legacy-peer-deps

    - name: Build Web
      working-directory: ${{ env.APP_DIR }}
      run: npm run build

    - name: Icon Mode - resources
      if: inputs.icon_mode == 'resources' && inputs.generate_assets == 'true'
      working-directory: ${{ env.APP_DIR }}
      run: |
        echo "🔧 Generating icons from resources/icon.png"
        if npm ls @capacitor/assets >/dev/null 2>&1; then
          npx @capacitor/assets generate --android
          echo "✅ Icons generated from resources/"
        else
          echo "⚠️ @capacitor/assets not installed. Skipping generation."
        fi

    - name: Icon Mode - native (Backup)
      if: inputs.icon_mode == 'native'
      run: |
        echo "🔧 Backing up native icons..."
        mkdir -p /tmp/mipmap-backup
        if [ -d "${{ env.APP_DIR }}/android/app/src/main/res/mipmap-*" ]; then
          cp -r ${{ env.APP_DIR }}/android/app/src/main/res/mipmap-* /tmp/mipmap-backup/ 2>/dev/null || true
          echo "✅ Native icons backed up"
        else
          echo "⚠️ No native icons found"
        fi

    - name: Sync Capacitor
      working-directory: ${{ env.APP_DIR }}
      run: npx cap sync android

    - name: Icon Mode - native (Restore)
      if: inputs.icon_mode == 'native'
      run: |
        echo "🔧 Restoring native icons..."
        if [ -d "/tmp/mipmap-backup" ] && [ "$(ls -A /tmp/mipmap-backup)" ]; then
          cp -r /tmp/mipmap-backup/* ${{ env.APP_DIR }}/android/app/src/main/res/ 2>/dev/null || true
          echo "✅ Native icons restored"
        else
          echo "⚠️ No backup found to restore"
        fi

    - name: Icon Mode - custom
      if: inputs.icon_mode == 'custom'
      run: |
        echo "🔧 Copying custom icons from ${{ inputs.icon_source }}"
        if [ -d "${{ inputs.icon_source }}" ]; then
          cp -r ${{ inputs.icon_source }}/* ${{ env.APP_DIR }}/android/app/src/main/res/ 2>/dev/null || true
          echo "✅ Custom icons copied"
        else
          echo "⚠️ Source not found: ${{ inputs.icon_source }}"
        fi

    - name: Verify Icons (Hash Report)
      id: verify-icons
      run: |
        echo "🔍 Icon Verification Report"
        echo "─────────────────────────────"
        echo "Mode: ${{ inputs.icon_mode }}"
        echo "Build Type: ${{ inputs.build_type }}"
        echo ""
        echo "┌──────────┬────────────┬──────────────────────────────────┐"
        echo "│ Density  │ Size       │ SHA256 Hash                     │"
        echo "├──────────┼────────────┼──────────────────────────────────┤"
        
        for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          FILE="${{ env.APP_DIR }}/android/app/src/main/res/mipmap-${density}/ic_launcher.png"
          if [ -f "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "N/A")
            HASH=$(sha256sum "$FILE" 2>/dev/null | awk '{print $1}')
            printf "│ %-8s │ %-10s │ %.32s... │\n" "${density}" "${SIZE}" "${HASH}"
          else
            printf "│ %-8s │ %-10s │ %-32s │\n" "${density}" "MISSING" "⚠️ File not found"
          fi
        done
        echo "└──────────┴────────────┴──────────────────────────────────┘"

    - name: Build APK
      working-directory: ${{ env.APP_DIR }}/android
      run: |
        chmod +x gradlew
        case "${{ inputs.build_type }}" in
          debug)
            echo "🔧 Building Debug APK..."
            ./gradlew assembleDebug --no-daemon
            ;;
          release)
            echo "🔧 Building Release APK..."
            ./gradlew assembleRelease --no-daemon
            ;;
          both)
            echo "🔧 Building Debug and Release APKs..."
            ./gradlew assembleDebug --no-daemon
            ./gradlew assembleRelease --no-daemon
            ;;
          *)
            echo "⚠️ Unknown build type, building Debug..."
            ./gradlew assembleDebug --no-daemon
            ;;
        esac

    - name: Build Summary
      id: summary
      run: |
        SUMMARY=$(cat << 'EOF'
        ✅ Android Build Complete
        
        📋 Summary
        ─────────────────────────────
        Project:    ${{ github.repository }}
        Commit:     ${{ github.sha }}
        Build Type: ${{ inputs.build_type }}
        Icon Mode:  ${{ inputs.icon_mode }}
        
        📱 APK Status
        ─────────────────────────────
        ${{ env.APP_DIR }}/android/app/build/outputs/apk/*/
        EOF
        )
        echo "summary<<EOF" >> $GITHUB_OUTPUT
        echo "$SUMMARY" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ inputs.build_type }}
        path: |
          android/app/build/outputs/apk/debug/*.apk
          frontend/android/app/build/outputs/apk/debug/*.apk
          android/app/build/outputs/apk/release/*.apk
          frontend/android/app/build/outputs/apk/release/*.apk
        retention-days: 30
