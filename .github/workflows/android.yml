# KIN Capacitor Builder v1.0.3
# Reusable Android Build Workflow (No asset generation)

name: Android Build

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '22'
      java_version:
        required: false
        type: string
        default: '17'
      build_type:
        required: false
        type: string
        default: 'debug'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java_version }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Dependencies
      run: |
        if [ -f "package.json" ]; then
          npm install --legacy-peer-deps
        elif [ -f "frontend/package.json" ]; then
          cd frontend
          npm install --legacy-peer-deps
        fi

    - name: Build Web
      run: |
        if [ -f "package.json" ]; then
          npm run build
        elif [ -f "frontend/package.json" ]; then
          cd frontend
          npm run build
        fi

    - name: Sync Capacitor
      run: |
        if [ -f "capacitor.config.json" ]; then
          npx cap sync android
        elif [ -f "frontend/capacitor.config.json" ]; then
          cd frontend
          npx cap sync android
        fi

    - name: Build Debug APK
      run: |
        if [ -d "android" ]; then
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        elif [ -d "frontend/android" ]; then
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
        fi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: |
          android/app/build/outputs/apk/debug/*.apk
          frontend/android/app/build/outputs/apk/debug/*.apk
        retention-days: 30
