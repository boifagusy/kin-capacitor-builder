# KIN Capacitor Builder v1.0.7
# Production-grade reusable Android build workflow
# CRITICAL FIX: Native mode now removes adaptive icon override

name: Android Build

on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '22'
      java_version:
        required: false
        type: string
        default: '17'
      build_type:
        description: 'Build type: debug, release, both'
        required: false
        type: string
        default: 'debug'
      icon_mode:
        description: 'Icon handling: resources, native, custom'
        required: false
        type: string
        default: 'resources'
      icon_source:
        description: 'Path to custom icon source (for custom mode)'
        required: false
        type: string
        default: 'branding/icons'
      generate_assets:
        description: 'Generate adaptive icons from resources/icon.png (ignored in native mode)'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node_version }}

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java_version }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install ImageMagick
      run: sudo apt-get update && sudo apt-get install -y imagemagick

    - name: Detect Project Structure
      id: detect
      run: |
        if [ -f "frontend/package.json" ]; then
          echo "APP_DIR=frontend" >> $GITHUB_ENV
        else
          echo "APP_DIR=." >> $GITHUB_ENV
        fi
        echo "📁 Project structure detected: ${{ env.APP_DIR }}"

    - name: Install Dependencies
      working-directory: ${{ env.APP_DIR }}
      run: npm install --legacy-peer-deps

    - name: Build Web
      working-directory: ${{ env.APP_DIR }}
      run: npm run build

    # ============================================================
    # ICON MODE - NATIVE: BACKUP BEFORE SYNC
    # ============================================================
    - name: Native Mode - Backup Icons (BEFORE sync)
      if: inputs.icon_mode == 'native'
      working-directory: ${{ env.APP_DIR }}
      run: |
        echo "🔧 Backing up native icons BEFORE sync..."
        mkdir -p /tmp/mipmap-backup
        if [ -d "android/app/src/main/res/mipmap-hdpi" ]; then
          cp -r android/app/src/main/res/mipmap-* /tmp/mipmap-backup/ 2>/dev/null || true
          echo "✅ Native icons backed up"
        else
          echo "⚠️ No native icons found to backup"
        fi

    # ============================================================
    # PREPARE SOURCE ICON (for resources/custom modes only)
    # ============================================================
    - name: Prepare Source Icon
      if: inputs.icon_mode != 'native' && inputs.generate_assets == 'true'
      working-directory: ${{ env.APP_DIR }}
      run: |
        echo "🔧 Preparing source icon for adaptive generation..."
        mkdir -p resources
        
        if [ -f "${{ inputs.icon_source }}/icon.png" ]; then
          cp ${{ inputs.icon_source }}/icon.png resources/icon.png
        elif [ -f "resources/icon.png" ]; then
          echo "✅ resources/icon.png already exists"
        else
          echo "⚠️ No source icon found, skipping generation"
          exit 0
        fi
        
        DIMS=$(identify -format "%wx%h" resources/icon.png 2>/dev/null || echo "unknown")
        echo "📐 Icon dimensions: $DIMS"
        if [ "$DIMS" != "1024x1024" ]; then
          echo "⚠️ Icon is not 1024x1024 — adaptive icon generation may look wrong"
        else
          echo "✅ Icon dimensions validated: 1024x1024"
        fi

    # ============================================================
    # SYNC CAPACITOR
    # ============================================================
    - name: Sync Capacitor
      working-directory: ${{ env.APP_DIR }}
      run: npx cap sync android

    # ============================================================
    # GENERATE ADAPTIVE ICONS (resources/custom modes only)
    # ============================================================
    - name: Generate Adaptive Icons
      if: inputs.icon_mode != 'native' && inputs.generate_assets == 'true'
      working-directory: ${{ env.APP_DIR }}
      run: |
        echo "🔧 Generating adaptive icons..."
        
        if [ ! -f "resources/icon.png" ]; then
          echo "⚠️ resources/icon.png not found, skipping generation"
          exit 0
        fi
        
        if ! npm ls @capacitor/assets >/dev/null 2>&1; then
          echo "⚠️ @capacitor/assets not installed, installing..."
          npm install @capacitor/assets --save-dev --legacy-peer-deps
        fi
        
        if npx @capacitor/assets generate --android; then
          echo "✅ Adaptive icons generated successfully"
          echo "ICON_GENERATION_STATUS=success" >> $GITHUB_ENV
        else
          echo "❌ Generation failed, removing adaptive icons"
          rm -rf android/app/src/main/res/mipmap-anydpi-v26/
          echo "ICON_GENERATION_STATUS=failed" >> $GITHUB_ENV
        fi

    # ============================================================
    # RESTORE NATIVE ICONS (AFTER sync + generation)
    # AND CRITICAL: REMOVE ADAPTIVE ICON OVERRIDE
    # ============================================================
    - name: Native Mode - Restore Icons (AFTER sync)
      if: inputs.icon_mode == 'native'
      working-directory: ${{ env.APP_DIR }}
      run: |
        echo "🔧 Restoring native icons AFTER sync..."
        if [ -d "/tmp/mipmap-backup" ] && [ "$(ls -A /tmp/mipmap-backup)" ]; then
          cp -r /tmp/mipmap-backup/* android/app/src/main/res/ 2>/dev/null || true
          echo "✅ Native icons restored"
        else
          echo "⚠️ No backup found to restore"
        fi
        
        # CRITICAL: Remove adaptive icon override so restored PNGs actually take effect
        echo "🔧 Removing adaptive icon XML (native mode uses PNG fallback only)"
        rm -rf android/app/src/main/res/mipmap-anydpi-v26/
        echo "✅ Adaptive icon override removed"

    # ============================================================
    # FALLBACK: REMOVE ADAPTIVE ICONS (if generation failed)
    # ============================================================
    - name: Remove Adaptive Icons (fallback)
      if: inputs.generate_assets == 'true' && env.ICON_GENERATION_STATUS == 'failed'
      working-directory: ${{ env.APP_DIR }}
      run: |
        echo "🔧 Removing adaptive icons (fallback)..."
        rm -rf android/app/src/main/res/mipmap-anydpi-v26/
        echo "✅ Adaptive icons removed"

    # ============================================================
    # CUSTOM MODE: COPY ICONS FROM SOURCE
    # ============================================================
    - name: Custom Mode - Copy Icons
      if: inputs.icon_mode == 'custom'
      working-directory: ${{ env.APP_DIR }}
      run: |
        echo "🔧 Copying custom icons from ${{ inputs.icon_source }}"
        if [ -d "${{ inputs.icon_source }}" ]; then
          cp -r ${{ inputs.icon_source }}/* android/app/src/main/res/ 2>/dev/null || true
          echo "✅ Custom icons copied"
        else
          echo "⚠️ Source not found: ${{ inputs.icon_source }}"
        fi

    # ============================================================
    # VERIFY ICONS (Hash Report)
    # ============================================================
    - name: Verify Icons (Hash Report)
      id: verify-icons
      run: |
        echo "🔍 Icon Verification Report"
        echo "─────────────────────────────"
        echo "Mode: ${{ inputs.icon_mode }}"
        echo "Generate Assets: ${{ inputs.generate_assets }}"
        echo "Build Type: ${{ inputs.build_type }}"
        echo ""
        echo "┌──────────┬────────────┬──────────────────────────────────┐"
        echo "│ Density  │ Size       │ SHA256 Hash                     │"
        echo "├──────────┼────────────┼──────────────────────────────────┤"
        
        for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
          FILE="${{ env.APP_DIR }}/android/app/src/main/res/mipmap-${density}/ic_launcher.png"
          if [ -f "$FILE" ]; then
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || echo "N/A")
            HASH=$(sha256sum "$FILE" 2>/dev/null | awk '{print $1}')
            printf "│ %-8s │ %-10s │ %.32s... │\n" "${density}" "${SIZE}" "${HASH}"
          else
            printf "│ %-8s │ %-10s │ %-32s │\n" "${density}" "MISSING" "⚠️ File not found"
          fi
        done
        echo "└──────────┴────────────┴──────────────────────────────────┘"
        
        if [ -f "${{ env.APP_DIR }}/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml" ]; then
          echo ""
          echo "✅ Adaptive icons present"
        else
          echo ""
          echo "ℹ️ Adaptive icons removed (using PNG fallback)"
        fi

    # ============================================================
    # BUILD APK
    # ============================================================
    - name: Build APK
      working-directory: ${{ env.APP_DIR }}/android
      run: |
        chmod +x gradlew
        case "${{ inputs.build_type }}" in
          debug)
            ./gradlew assembleDebug --no-daemon
            ;;
          release)
            ./gradlew assembleRelease --no-daemon
            ;;
          both)
            ./gradlew assembleDebug --no-daemon
            ./gradlew assembleRelease --no-daemon
            ;;
          *)
            ./gradlew assembleDebug --no-daemon
            ;;
        esac

    # ============================================================
    # VERIFY APK CONTENTS (Glob-safe, build_type aware)
    # ============================================================
    - name: Verify APK Contents
      run: |
        echo "🔍 Verifying APK contents..."
        case "${{ inputs.build_type }}" in
          release)
            APK_DIR="${{ env.APP_DIR }}/android/app/build/outputs/apk/release"
            ;;
          both|debug|*)
            APK_DIR="${{ env.APP_DIR }}/android/app/build/outputs/apk/debug"
            ;;
        esac
        APK_FILE=$(find "$APK_DIR" -name "*.apk" 2>/dev/null | head -n1)
        if [ -n "$APK_FILE" ]; then
          echo "📦 APK found: $(basename $APK_FILE)"
          mkdir -p /tmp/apk_check
          unzip -o "$APK_FILE" -d /tmp/apk_check res/mipmap-anydpi-v26/ 2>/dev/null || echo "ℹ️ No adaptive icons in APK"
          echo ""
          echo "📁 Adaptive icons in APK:"
          ls -la /tmp/apk_check/res/mipmap-anydpi-v26/ 2>/dev/null || echo "❌ None found (PNG fallback)"
        else
          echo "⚠️ APK not found in $APK_DIR, skipping verification"
        fi

    # ============================================================
    # UPLOAD APK (uses ${{ env.APP_DIR }})
    # ============================================================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-${{ inputs.build_type }}
        path: ${{ env.APP_DIR }}/android/app/build/outputs/apk/**/*.apk
        retention-days: 30
